<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TampaRestore — Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --red: #D92B2B;
      --navy: #0A1628;
      --navy-mid: #0F2040;
      --navy-light: #162A50;
      --white: #FFFFFF;
      --off-white: #F5F3EE;
      --gray: #8A96A8;
      --green: #059669;
      --light-gray: #E8EAF0;
    }
    
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--off-white);
      color: #1A1E2E;
    }
    
    /* Login Screen */
    #login-screen {
      position: fixed;
      inset: 0;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .login-box {
      background: var(--white);
      padding: 40px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    
    .login-box h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 24px;
      text-transform: uppercase;
      color: var(--navy);
      margin-bottom: 20px;
    }
    
    .login-box input {
      width: 100%;
      padding: 14px;
      border: 2px solid var(--light-gray);
      font-family: 'Barlow', sans-serif;
      font-size: 16px;
      margin-bottom: 12px;
      text-align: center;
    }
    
    .login-box input:focus {
      border-color: var(--red);
      outline: none;
    }
    
    .login-box button {
      width: 100%;
      background: var(--red);
      color: var(--white);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 18px;
      text-transform: uppercase;
      padding: 14px;
      border: none;
      cursor: pointer;
    }
    
    .login-error {
      color: var(--red);
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }
    
    /* Dashboard */
    #dashboard { display: none; }
    
    header {
      background: var(--navy);
      padding: 16px 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 20px;
      color: var(--white);
      text-transform: uppercase;
    }
    
    .logo span { color: var(--red); }
    
    .logout-btn {
      background: transparent;
      border: 1px solid var(--gray);
      color: var(--gray);
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
    }
    
    /* Stats */
    .stats-bar {
      background: var(--white);
      padding: 24px 5%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      border-bottom: 1px solid var(--light-gray);
    }
    
    .stat-card { text-align: center; }
    .stat-num { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 36px; color: var(--navy); }
    .stat-label { font-size: 12px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.05em; }
    
    /* Main */
    .main-content { padding: 24px 5%; }
    
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    
    .section-header h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 18px;
      text-transform: uppercase;
    }
    
    .leads-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--white);
    }
    
    .leads-table th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--gray);
      padding: 12px 8px;
      border-bottom: 2px solid var(--light-gray);
      background: var(--off-white);
    }
    
    .leads-table td {
      padding: 12px 8px;
      font-size: 14px;
      border-bottom: 1px solid var(--light-gray);
    }
    
    .lead-name { font-weight: 600; }
    .lead-phone { color: var(--navy); }
    .status-new { background: #FEF3C7; color: #92400E; padding: 4px 8px; font-size: 11px; font-weight: 600; text-transform: uppercase; border-radius: 4px; }
    .status-contacted { background: #DBEAFE; color: #1E40AF; padding: 4px 8px; font-size: 11px; font-weight: 600; text-transform: uppercase; border-radius: 4px; }
    .status-paid { background: #D1FAE5; color: #065F46; padding: 4px 8px; font-size: 11px; font-weight: 600; text-transform: uppercase; border-radius: 4px; }
    .status-closed { background: var(--light-gray); color: var(--gray); padding: 4px 8px; font-size: 11px; font-weight: 600; text-transform: uppercase; border-radius: 4px; }
    
    .refresh-btn {
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      background: var(--navy);
      color: var(--white);
      border: none;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--gray);
    }
    
    .loading { text-align: center; padding: 40px; color: var(--gray); }
    
    @media (max-width: 768px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <h2>🔒 Admin Access</h2>
    <input type="password" id="password-input" placeholder="Enter password" />
    <button onclick="checkPassword()">Login</button>
    <p class="login-error" id="login-error">Incorrect password</p>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <header>
    <div class="logo">Tampa<span>Restore</span> Admin</div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </header>
  
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-num" id="total-leads">0</div>
      <div class="stat-label">Total Leads</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="today-leads">0</div>
      <div class="stat-label">Today</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="conversion-rate">0%</div>
      <div class="stat-label">Converted</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="total-revenue">$0</div>
      <div class="stat-label">Revenue</div>
    </div>
  </div>
  
  <div class="main-content">
    <div class="section-header">
      <h3>All Leads (From Netlify)</h3>
      <button class="refresh-btn" onclick="loadLeads()">↻ Refresh</button>
    </div>
    
    <table class="leads-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Phone</th>
          <th>City</th>
          <th>Damage</th>
          <th>Status</th>
          <th>Received</th>
        </tr>
      </thead>
      <tbody id="leads-tbody">
        <tr><td colspan="6" class="loading">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const PASSWORD = 'TampaRestore2026!';
let allLeads = [];

// Login
function checkPassword() {
  const input = document.getElementById('password-input').value;
  if (input === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadLeads();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function logout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('password-input').value = '';
}

// Load leads from Netlify Forms (simulated - you need to fetch from Netlify API or manually add)
function loadLeads() {
  const tbody = document.getElementById('leads-tbody');
  tbody.innerHTML = '<tr><td colspan="6" class="loading">Loading leads from Netlify...</td></tr>';
  
  // For now, show instructions - to auto-fetch you'd need Netlify API key
  // This is a placeholder - manually enter leads as they come in
  setTimeout(() => {
    tbody.innerHTML = `
      <tr>
        <td class="lead-name">Tyler Belisle</td>
        <td class="lead-phone">8134828671</td>
        <td>Land O' Lakes</td>
        <td>Storm / Hurricane Damage</td>
        <td><span class="status-new">new</span></td>
        <td>Just now</td>
      </tr>
      <tr>
        <td colspan="6" style="text-align:center; padding: 20px; color: var(--gray); font-size: 13px;">
          <strong>Note:</strong> Leads also appear in Netlify Dashboard → Forms tab and your Google Sheet.<br>
          This dashboard is for quick overview. Check Netlify for full lead details.
        </td>
      </tr>
    `;
    
    updateStats();
  }, 500);
}

function updateStats() {
  document.getElementById('total-leads').textContent = '3';
  document.getElementById('today-leads').textContent = '3';
  document.getElementById('conversion-rate').textContent = '0%';
  document.getElementById('total-revenue').textContent = '$0';
}

// Password enter key
document.getElementById('password-input').addEventListener('keypress', e => {
  if (e.key === 'Enter') checkPassword();
});
</script>
</body>
</html>
