<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You - TampaRestore</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #0A1628 0%, #1a3a5c 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      text-align: center;
      max-width: 420px;
      width: 100%;
    }
    .icon {
      font-size: 72px;
      margin-bottom: 10px;
    }
    h1 {
      color: #059669;
      font-size: 28px;
      margin-bottom: 10px;
    }
    h1.declined {
      color: #D97706;
    }
    .status-badge {
      display: inline-block;
      background: #ECFDF5;
      color: #059669;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
      text-transform: uppercase;
    }
    .status-badge.declined {
      background: #FEF3C7;
      color: #D97706;
    }
    .lead-info {
      background: #f9fafb;
      padding: 20px;
      border-radius: 12px;
      margin: 20px 0;
      text-align: left;
    }
    .lead-info p {
      margin: 10px 0;
      font-size: 16px;
      display: flex;
      justify-content: space-between;
    }
    .lead-info strong {
      color: #374151;
    }
    .lead-info span {
      color: #6B7280;
    }
    .contact-section {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #E5E7EB;
    }
    .contact-section p {
      color: #666;
      font-size: 14px;
      margin: 8px 0;
    }
    .contact-section a {
      color: #D92B2B;
      text-decoration: none;
      font-weight: 600;
    }
    .contact-section .phone {
      font-size: 18px;
      color: #0A1628;
      font-weight: 700;
    }
    .close-btn {
      display: inline-block;
      margin-top: 25px;
      padding: 14px 32px;
      background: #0A1628;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .close-btn:hover {
      background: #D92B2B;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <div class="status-badge">Accepted</div>
    <h1>Thank You!</h1>
    
    <div class="lead-info">
      <p><strong>Lead Name</strong> <span id="lead-name">--</span></p>
      <p><strong>Phone</strong> <span id="lead-phone">--</span></p>
      <p><strong>City</strong> <span id="lead-city">--</span></p>
    </div>
    
    <div class="contact-section">
      <p>Questions? Contact Tyler:</p>
      <p class="phone">📞 (813) 482-8671</p>
      <p>📧 <a href="mailto:tylerbelislefl@gmail.com">tylerbelislefl@gmail.com</a></p>
    </div>
    
    <a href="#" class="close-btn" onclick="window.close(); return false;">Close Window</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const action = params.get('action');
    const card = document.querySelector('.card');
    const icon = document.querySelector('.icon');
    const badge = document.querySelector('.status-badge');
    const h1 = document.querySelector('h1');
    
    if (action === 'pass') {
      // DECLINED / PASSED STATE
      icon.textContent = '➡️';
      badge.textContent = 'Passed On';
      badge.classList.add('declined');
      h1.textContent = 'Lead Passed On';
      h1.classList.add('declined');
      card.style.background = '#FFFBEB';
      document.getElementById('lead-phone').parentElement.style.display = 'none';
      document.getElementById('lead-city').parentElement.style.display = 'none';
    }
    
    document.getElementById('lead-name').textContent = params.get('name') || 'Unknown';
    document.getElementById('lead-phone').textContent = params.get('phone') || 'N/A';
    document.getElementById('lead-city').textContent = params.get('city') || 'N/A';
  </script>
</body>
</html>
