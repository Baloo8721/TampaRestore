<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You - TampaRestore</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .icon {
      font-size: 60px;
      margin-bottom: 20px;
    }
    h1 {
      color: #059669;
      margin-bottom: 20px;
    }
    h1.orange {
      color: #D97706;
    }
    .lead-info {
      background: #f9fafb;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      text-align: left;
    }
    .lead-info p {
      margin: 8px 0;
      font-size: 16px;
    }
    .lead-info strong {
      color: #374151;
    }
    .contact {
      margin-top: 20px;
      color: #666;
    }
    .contact a {
      color: #D92B2B;
      text-decoration: none;
    }
    .close-btn {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 24px;
      background: #0A1628;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Thanks!</h1>
    <div class="lead-info">
      <p><strong>Lead:</strong> <span id="lead-name"></span></p>
      <p><strong>Phone:</strong> <span id="lead-phone"></span></p>
      <p><strong>City:</strong> <span id="lead-city"></span></p>
    </div>
    <p class="contact">Questions? Email: <a href="mailto:tylerbelislefl@gmail.com">tylerbelislefl@gmail.com</a></p>
    <a href="#" class="close-btn" onclick="window.close(); return false;">Close</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const action = params.get('action');
    
    if (action === 'pass') {
      document.querySelector('.icon').textContent = '❌';
      document.querySelector('h1').textContent = 'Lead Passed On';
      document.querySelector('h1').classList.add('orange');
      document.getElementById('lead-phone').parentElement.style.display = 'none';
      document.getElementById('lead-city').parentElement.style.display = 'none';
    }
    
    document.getElementById('lead-name').textContent = params.get('name') || 'Unknown';
    document.getElementById('lead-phone').textContent = params.get('phone') || 'N/A';
    document.getElementById('lead-city').textContent = params.get('city') || 'N/A';
  </script>
</body>
</html>
